<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 · API 服务</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1 id="title">登录</h1>
      <p class="auth-sub">数学建模助教 · API 接入服务</p>

      <form id="login-form" autocomplete="on">
        <div class="field" id="nickname-field" style="display:none">
          <label for="nickname">昵称</label>
          <input type="text" id="nickname" placeholder="怎么称呼你" />
        </div>
        <div class="field">
          <label for="phone">手机号 / 邮箱</label>
          <input type="text" id="phone" autocomplete="username" />
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input type="password" id="password" autocomplete="current-password" />
        </div>

        <button type="button" class="btn btn-block" id="submit">登录</button>
      </form>
      <div class="msg" id="msg"></div>

      <div class="toggle-line">
        <span id="toggle-text">还没有账号？</span>
        <a href="#" id="toggle">注册一个</a>
      </div>
    </div>
  </div>

  <script src="/static/common.js?v=2"></script>
  <script src="/static/login.js?v=2"></script>
</body>
</html>
