<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数学建模助教 · 主页</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css?v=anim1" />
  <link rel="stylesheet" href="/static/anim.css?v=anim4" />
</head>
<body>
  <div class="home">
    <canvas id="bg-canvas" class="mm-ambient"></canvas>
    <header class="home-top">
      <div class="home-brand"><span class="home-mark">绣</span>数学建模助教</div>
      <div class="home-user" id="home-user"></div>
    </header>

    <main class="home-main">
      <h1 class="home-greet" id="greet">选择一个开始的方式</h1>
      <p class="home-greet-sub">三条路，都通向把一道建模题做完。</p>

      <div class="home-cards">
        <a class="home-card" href="/learn">
          <div class="home-card-icon">📚</div>
          <h2>学习模式</h2>
          <p>顺着知识图谱，从基础概念一步步点亮，看清每个模型的来龙去脉。</p>
          <div class="home-card-meta" id="meta-learn">知识图谱</div>
        </a>

        <a class="home-card" href="/build">
          <div class="home-card-icon">🛠️</div>
          <h2>做建模</h2>
          <p>两种方式：自己折腾的「独立练习」工作台，或带一道题让助教拆步、陪你一步步做的「做题」。</p>
          <div class="home-card-meta">独立练习 · 做题</div>
        </a>

        <a class="home-card" href="/practice">
          <div class="home-card-icon">🎯</div>
          <h2>真题练习</h2>
          <p>历年真题分步练，写完提交，AI 按评分要点给分点评，看到差距在哪。</p>
          <div class="home-card-meta" id="meta-practice">分步批改</div>
        </a>
      </div>
    </main>
  </div>
  <script src="/static/anim.js?v=anim1"></script>
  <script src="/static/profile.js?v=anim1"></script>
  <script src="/static/onboarding.js?v=anim1"></script>
  <script src="/static/keysetup.js?v=anim1"></script>
  <script src="/static/home.js?v=anim1"></script>
</body>
</html>
