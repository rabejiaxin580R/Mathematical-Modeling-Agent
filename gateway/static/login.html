<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 · API 服务</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="auth-page">
    <!-- 左侧 Hero 广告区 -->
    <div class="auth-hero">
      <div class="hero-inner">
        <div class="hero-logo">
          <span class="logo-icon">&#x1f9ee;</span>
          <h1 class="hero-title">数学建模助教</h1>
        </div>
        <p class="hero-tagline">AI 驱动的数学建模辅助平台</p>

        <div class="hero-features">
          <div class="feature-item">
            <span class="feature-badge">&#x1f381;</span>
            <div>
              <strong>新用户免费试用 150 万 Token</strong>
              <p>注册即送，无需充值即可体验完整功能</p>
            </div>
          </div>
          <div class="feature-item">
            <span class="feature-badge">&#x26a1;</span>
            <div>
              <strong>DeepSeek 旗舰模型驱动</strong>
              <p>采用 deepseek-v4-pro 旗舰模型，又快又强</p>
            </div>
          </div>
          <div class="feature-item">
            <span class="feature-badge">&#x2764;&#xfe0f;</span>
            <div>
              <strong>由项目作者自费提供</strong>
              <p>用爱发电，放心使用，不会突然跑路</p>
            </div>
          </div>
        </div>

        <p class="hero-footer-text">
          觉得好用？欢迎推荐给同学。网关仅做鉴权计费，所有请求直接转发 DeepSeek 官方 API。
        </p>
      </div>
    </div>

    <!-- 右侧表单区（id 保持不变，确保 login.js 兼容） -->
    <div class="auth-form-side">
      <div class="auth-card">
        <h1 id="title">登录</h1>
        <p class="auth-sub">数学建模助教 · API 接入服务</p>

        <form id="login-form" autocomplete="on">
          <div class="field" id="nickname-field" style="display:none">
            <label for="nickname">昵称</label>
            <input type="text" id="nickname" placeholder="怎么称呼你" />
          </div>
          <div class="field">
            <label for="phone">手机号 / 邮箱</label>
            <input type="text" id="phone" autocomplete="username" />
          </div>
          <div class="field">
            <label for="password">密码</label>
            <input type="password" id="password" autocomplete="current-password" />
          </div>

          <button type="button" class="btn btn-block" id="submit">登录</button>
        </form>
        <div class="msg" id="msg"></div>

        <div class="toggle-line">
          <span id="toggle-text">还没有账号？</span>
          <a href="#" id="toggle">注册一个</a>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/common.js?v=2"></script>
  <script src="/static/login.js?v=2"></script>
</body>
</html>
