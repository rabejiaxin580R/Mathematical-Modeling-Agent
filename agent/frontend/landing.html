<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数学建模助教 · 登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css?v=anim1" />
  <link rel="stylesheet" href="/static/anim.css?v=anim4" />
</head>
<body>
  <canvas id="bg-canvas" class="bg-canvas"></canvas>
  <div class="landing">
    <div class="landing-card">
      <div class="landing-brand">
        <span class="landing-mark">绣</span>
        <div>
          <h1 class="landing-title">数学建模助教</h1>
          <p class="landing-sub">为建模新手而生 · 即开即用</p>
        </div>
      </div>

      <p class="landing-hint">起个名字，挑个头像，立刻开始。无需注册，数据存在本机。</p>

      <label class="landing-label">你的昵称</label>
      <input type="text" id="nickname" class="landing-input" maxlength="20" placeholder="例如：小明" autofocus />

      <label class="landing-label">选个头像</label>
      <div class="avatar-grid" id="avatar-grid"></div>

      <button class="landing-btn" id="btn-enter">进入</button>

      <div class="landing-existing" id="existing" hidden></div>
    </div>
  </div>
  <script src="/static/anim.js?v=anim1"></script>
  <script src="/static/profile.js?v=anim1"></script>
  <script src="/static/onboarding.js?v=anim1"></script>
  <script src="/static/landing.js?v=anim1"></script>
</body>
</html>
