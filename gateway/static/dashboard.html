<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>控制台 · API 服务</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="topbar">
    <div class="brand">数学建模助教 · API 控制台</div>
    <div class="right">
      <span id="who"></span>
      <button class="btn btn-ghost btn-sm" id="logout">退出登录</button>
    </div>
  </div>

  <div class="container">
    <!-- 余额 + 兑换 -->
    <div class="card">
      <h2>余额</h2>
      <div class="balance-row">
        <div class="balance-big">¥<span id="balance">0.00</span></div>
        <div class="balance-free" id="free"></div>
      </div>
      <div class="row" style="margin-top:18px">
        <input type="text" id="card-code" placeholder="输入卡密兑换充值" />
        <button class="btn" id="redeem">兑换</button>
      </div>
      <div class="msg" id="redeem-msg"></div>
    </div>

    <!-- 接入说明 -->
    <div class="card">
      <h2>如何接入</h2>
      <p class="hint">在「数学建模助教」本地 app 的「设置」里，把下面两项填进去，即可用本服务的额度：</p>
      <table>
        <tr><th style="width:140px">API 地址 (Base URL)</th><td class="mono" id="base-url"></td></tr>
        <tr><th>API Key</th><td>下方生成，复制粘贴到设置里的「API 密钥」</td></tr>
        <tr><th>模型</th><td class="mono" id="models"></td></tr>
      </table>
    </div>

    <!-- API Key 管理 -->
    <div class="card">
      <h2>API Key</h2>
      <p class="hint">Key 只在生成时完整显示一次，请立即复制保存。丢失只能重新生成。</p>
      <div class="row">
        <input type="text" id="key-name" placeholder="备注名（可选，如：我的笔记本）" />
        <button class="btn" id="create-key">生成新 Key</button>
      </div>
      <div class="keybox" id="new-key" style="display:none"></div>
      <table style="margin-top:16px">
        <thead><tr><th>备注</th><th>Key</th><th>创建时间</th><th>最近使用</th><th></th></tr></thead>
        <tbody id="keys-body"></tbody>
      </table>
    </div>

    <!-- 用量 -->
    <div class="card">
      <h2>最近用量</h2>
      <table>
        <thead><tr><th>时间</th><th>模型</th><th>输入/输出 token</th><th>花费</th></tr></thead>
        <tbody id="usage-body"></tbody>
      </table>
    </div>
  </div>

  <script src="/static/common.js?v=2"></script>
  <script src="/static/dashboard.js?v=2"></script>
</body>
</html>
